version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci
    labels:
      - dependencies
      - ci
    groups:
      actions-minor-and-patch:
        update-types:
          - minor
          - patch
